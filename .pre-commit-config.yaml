---
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/lyz-code/yamlfix
    rev: 1.19.1
    hooks:
      - id: yamlfix
        args: [-c, .yamlfix.toml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=5120]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: trailing-whitespace
        exclude_types: [markdown]  # Avoid conflicts with markdown formatting
      - id: check-xml
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: no-commit-to-branch
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: pretty-format-json
        alias: pretty-format-openapi-json
        args: [--autofix, --no-ensure-ascii, '--top-keys=openapi,info,servers,paths,components']
        files: docs/openapi.json
      - id: mixed-line-ending
        alias: mixed-line-ending-openapi-json
        args: [--fix=lf]
        files: docs/openapi.json
  - repo: local
    hooks:
      - id: sensitive-data-leak-urls
        name: Sensitive data leak - URLs
        entry: (?<!polarion-opensource@)(?<!www\.)sbb\.ch
        language: pygrep
        types: [text]
      - id: sensitive-data-leak-ue-numbers
        name: Sensitive data leak - UE numbers
        entry: \b([uUeE]{1,2})\d{5,6}\b
        language: pygrep
        types: [text]
      - id: sensitive-data-leak-dev-ticket-numbers
        name: Sensitive data leak - DEV ticket numbers
        entry: \bDEV-\d{1,6}\b
        language: pygrep
        types: [text]
      # React app (ui/) - mirrors react-sbb-polarion's hooks. `npm --prefix ui run` executes with ui/
      # as the working directory, so Prettier's globs and `eslint .` stay scoped to the app. Check-only
      # (they block the commit but do not modify the tree); run `npm --prefix ui run format`/`lint:fix`
      # to fix. Gated on ui/ source files so non-ui commits skip them.
      - id: ui-prettier
        name: UI Prettier (format:check)
        entry: npm --prefix ui run format:check
        language: system
        pass_filenames: false
        files: ^ui/.*\.(ts|tsx|css|html)$
      - id: ui-eslint
        name: UI ESLint
        entry: npm --prefix ui run lint
        language: system
        pass_filenames: false
        files: ^ui/.*\.(ts|tsx|js|mjs)$
      # Dockerized Vitest (behavior + visual regression) with the 80% coverage gate. Heavy (~30-60s+,
      # needs Docker running); gated on ui/ source changes.
      - id: ui-test-coverage-docker
        name: UI Vitest + coverage gate (Docker)
        entry: npm --prefix ui run test:coverage:docker
        language: system
        pass_filenames: false
        files: ^ui/.*\.(ts|tsx|css)$
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/grigoriev/pre-commit-check-git-user
    rev: v0.9.3
    hooks:
      - id: check-git-config-user-email
        args: [--templates, ^\S+\.\S+@sbb\.ch$]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.5
    hooks:
      - id: commitizen
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.27.0
    hooks:
      - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
